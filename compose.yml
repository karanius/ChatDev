services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: chatdev_backend
    volumes:
      - .:/app
    ports:
      - "6400:6400"
    env_file:
      - .env
      - .env.docker
    networks:
      - chatdev_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: chatdev_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci --no-audit --no-fund && npm run dev -- --host"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - .env
      - .env.docker
    depends_on:
      - backend
    networks:
      - chatdev_net
    restart: unless-stopped

networks:
  chatdev_net:
    name: chatdev_net
    driver: bridge

volumes:
  frontend_node_modules:
